services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
      POSTGRES_DB: lifeos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos -d lifeos"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      # Override the compose-internal DB host regardless of .env value.
      DATABASE_URL: postgresql+asyncpg://lifeos:lifeos@db:5432/lifeos
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Run migrations, seed demo data, then start the API.
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts

volumes:
  pgdata:
